app = 'social-net-work'
primary_region = 'cdg'

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024

[env]
  CORS_ORIGIN='http://localhost:5173'
  API_URL = 'https://social-net-work.fly.dev/api'
